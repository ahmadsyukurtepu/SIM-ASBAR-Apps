<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persuratan | SIM-ASBAR-Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Custom Table & Badge Styles */
        .badge-masuk { background-color: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .badge-keluar { background-color: #f1f8e9; color: #1b5e20; border: 1px solid #dcedc8; }
        .btn-pdf { color: #dc3545; transition: 0.3s; }
        .btn-pdf:hover { color: #a71d2a; transform: scale(1.2); }
        
        /* Menyesuaikan table agar lebih ringkas di layar kecil */
        @media (max-width: 768px) {
            .table-responsive { font-size: 0.85rem; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

    <nav class="sidebar shadow">
        <div class="text-center mb-4 pt-3">
            <img src="../assets/logo.png" class="mb-2 rounded-circle bg-white p-1" width="50" onerror="this.src='https://via.placeholder.com/50'">
            <h6 class="fw-bold text-white mb-0">SIM-ASBAR</h6>
            <small class="text-white-50" id="userLevelDisplay"></small>
        </div>
        
        <ul class="nav flex-column" id="mainMenu">
            </ul>

        <hr class="text-white-50 mt-4">
        <button onclick="logout()" class="btn btn-link text-white text-decoration-none w-100 text-start ps-3">
            <i class="fa fa-power-off me-2"></i> <span>Keluar</span>
        </button>
    </nav>

    <main>
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border-start border-success border-4">
            <div>
                <h4 class="mb-0 fw-bold">Manajemen Persuratan</h4>
                <small class="text-muted" id="subJudul">Sinkronisasi data...</small>
            </div>
            <button class="btn btn-success" onclick="tambahSurat()">
                <i class="fa fa-plus-circle me-1"></i> <span class="hide-mobile">Input Surat</span>
            </button>
        </div>

        <div class="alert alert-light border-0 shadow-sm mb-3 d-flex justify-content-between align-items-center">
            <div class="small">
                <i class="fa fa-info-circle text-success me-1"></i> 
                Menampilkan arsip digital untuk unit: <strong id="namaLembaga"></strong>
            </div>
        </div>

        <div class="card shadow-sm border-0 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="tabelSurat">
                        <thead class="bg-light text-secondary">
                            <tr>
                                <th class="px-3" width="120">Kategori</th>
                                <th width="130">Tanggal</th>
                                <th width="180">Nomor Surat</th>
                                <th>Perihal</th>
                                <th class="hide-mobile">Asal / Tujuan</th>
                                <th class="text-center">File</th>
                                <th class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="isiTabelSurat">
                            </tbody>
                    </table>
                    
                    <div id="loader" class="text-center py-5">
                        <div class="spinner-border text-success" role="status"></div>
                        <p class="mt-2 text-muted small">Mengunduh data dari cloud...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/global.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lembagaReq = urlParams.get('lembaga'); 

        async function initSuratPage() {
            const raw = localStorage.getItem("user_simasbar");
            if (!raw) { window.location.href = "../index.html"; return; }
            const user = JSON.parse(raw);
            
            // Set UI Labels
            const labelLembaga = lembagaReq ? lembagaReq.toUpperCase() : user.lembaga.toUpperCase();
            document.getElementById("subJudul").innerText = "Unit Kerja: " + labelLembaga;
            document.getElementById("namaLembaga").innerText = labelLembaga;
            document.getElementById("userLevelDisplay").innerText = user.level;

            // Load Data
            loadDataSurat(labelLembaga);
        }

        async function loadDataSurat(targetLembaga) {
            const tbody = document.getElementById("isiTabelSurat");
            const loader = document.getElementById("loader");

            // Menggunakan fetchModulData dari api.js yang sudah diperbaiki
            const result = await fetchModulData("SURAT", targetLembaga);
            loader.style.display = "none";

            if (result && result.status === "success") {
                const data = result.data;
                if (data.length <= 1) {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-muted">Belum ada data surat di database.</td></tr>`;
                    return;
                }

                let html = "";
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    const kat = row[0] ? row[0].toUpperCase() : "N/A";
                    const badgeClass = kat === "MASUK" ? "badge-masuk" : "badge-keluar";
                    const pdfLink = row[5];
                    
                    html += `
                        <tr>
                            <td class="px-3"><span class="badge ${badgeClass} p-2 w-100" style="font-size:10px">${kat}</span></td>
                            <td class="small text-muted">${formatTgl(row[1])}</td>
                            <td class="fw-bold small text-truncate" style="max-width:150px">${row[2] || '-'}</td>
                            <td class="small fw-medium">${row[3] || '-'}</td>
                            <td class="hide-mobile small text-muted">${row[4] || '-'}</td>
                            <td class="text-center">
                                ${pdfLink ? `<a href="${pdfLink}" target="_blank" class="btn-pdf"><i class="fa fa-file-pdf fa-lg"></i></a>` : '-'}
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-light border" title="Edit Data"><i class="fa fa-edit text-success"></i></button>
                            </td>
                        </tr>
                    `;
                }
                tbody.innerHTML = html;
            } else {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger small fst-italic">Error: ${result.message}</td></tr>`;
            }
        }

        function formatTgl(str) {
            if(!str) return "-";
            const d = new Date(str);
            return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
        }

        function tambahSurat() {
            alert("Fitur Input Surat sedang disiapkan!");
        }

        window.onload = initSuratPage;
    </script>
</body>
</html>
