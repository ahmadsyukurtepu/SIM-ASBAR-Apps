<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SIM-ASBAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-200 flex-shrink-0 flex flex-col transition-all duration-300">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 class="text-xl font-bold text-white">SIM-ASBAR</h1>
            <p id="labelLembaga" class="text-xs text-slate-400 mt-1 uppercase tracking-widest"></p>
        </div>
        
        <nav id="sidebarMenu" class="flex-1 overflow-y-auto p-4 space-y-2">
            </nav>

        <div class="p-4 bg-slate-800 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white text-sm" id="userInitial">U</div>
                <div>
                    <p id="userName" class="text-xs font-semibold text-white truncate w-24"></p>
                    <p id="userLevel" class="text-[10px] text-slate-400"></p>
                </div>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-400">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <h2 id="pageTitle" class="text-lg font-semibold text-slate-800">Dashboard</h2>
            <div class="flex items-center space-x-4">
                <button class="p-2 hover:bg-slate-100 rounded-full relative">
                    <i data-lucide="bell" class="w-5 h-5 text-slate-600"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="h-8 w-[1px] bg-slate-200"></div>
                <span id="currentDate" class="text-sm text-slate-500"></span>
            </div>
        </header>

        <div id="content" class="p-8 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-3 bg-gradient-to-r from-blue-600 to-indigo-700 p-8 rounded-2xl text-white shadow-lg">
                    <h3 class="text-2xl font-bold mb-2">Selamat Datang, <span id="welcomeName">User</span>!</h3>
                    <p class="opacity-80">Anda masuk sebagai <span id="welcomeLevel" class="font-semibold underline"></span>. Silakan pilih menu di samping untuk mengelola data.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/global.js"></script>
    <script>
        // Inisialisasi Icon
        lucide.createIcons();
    </script>
</body>
</html>
