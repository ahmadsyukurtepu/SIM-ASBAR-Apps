<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SIM-ASBAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse shadow">
            <div class="text-center mb-4">
                <img src="https://via.placeholder.com/60" class="mb-2 rounded-circle bg-white p-1">
                <h6 class="fw-bold text-white">SIM-ASBAR-Apps</h6>
                <span id="userLevel" class="badge bg-warning text-dark small"></span>
            </div>
            <ul class="nav flex-column" id="mainMenu"></ul>
            <hr class="text-white-50">
            <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="fa fa-power-off"></i> Keluar</button>
        </nav>

        <button class="btn btn-success d-md-none position-fixed bottom-0 end-0 m-3 shadow-lg rounded-circle" 
        type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMobile" style="width: 60px; height: 60px; z-index: 1050;">
    <i class="fa fa-bars fa-lg"></i>
</button>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-none d-md-block sidebar shadow">
            </nav>

        <div class="offcanvas offcanvas-start bg-success text-white" tabindex="-1" id="sidebarMobile" style="width: 280px;">
            <div class="offcanvas-header border-bottom border-white-50">
                <h5 class="offcanvas-title fw-bold">SIM-ASBAR</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body" id="mainMenuMobile">
                </div>
        </div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <h5 class="fw-bold mb-0"><i class="fa fa-chart-line me-2 text-success"></i>Statistik Data</h5>
                <select class="form-select form-select-sm w-auto" id="filterTahun">
                    <option value="2025/2026">2025/2026</option>
                    <option value="2024/2025">2024/2025</option>
                </select>
            </div>

            <div class="row g-3 mb-4" id="statGrid">
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="card border-0 shadow-sm text-center p-3">
                        <small class="text-muted d-block mb-1">Surat</small>
                        <h3 class="fw-bold mb-0 text-primary" id="countSurat">0</h3>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="card border-0 shadow-sm text-center p-3">
                        <small class="text-muted d-block mb-1">Kas (Jt)</small>
                        <h3 class="fw-bold mb-0 text-success" id="countDana">0</h3>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="card border-0 shadow-sm text-center p-3">
                        <small class="text-muted d-block mb-1">Pegawai</small>
                        <h3 class="fw-bold mb-0 text-dark" id="countPegawai">0</h3>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="card border-0 shadow-sm text-center p-3">
                        <small class="text-muted d-block mb-1">Santri</small>
                        <h3 class="fw-bold mb-0 text-info" id="countSantri">0</h3>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="card border-0 shadow-sm text-center p-3">
                        <small class="text-muted d-block mb-1">Alumni</small>
                        <h3 class="fw-bold mb-0 text-warning" id="countAlumni">0</h3>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4 text-center text-muted" style="height: 300px;">
                <i class="fa fa-chart-bar fa-3x mb-3 opacity-25"></i>
                <p>Grafik Statistik per Bulan akan tampil di sini</p>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
