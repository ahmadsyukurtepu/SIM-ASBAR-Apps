<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persuratan | SIM-ASBAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="sidebar shadow">
        <div class="text-center mb-4 pt-3">
            <img src="../assets/logo.png" class="mb-2 rounded-circle bg-white p-1" width="55" onerror="this.src='https://via.placeholder.com/55'">
            <h6 class="fw-bold text-white mb-0">SIM-ASBAR</h6>
            <small class="text-white-50" id="userLevel">...</small>
        </div>
        <ul class="nav flex-column" id="mainMenu"></ul>
        <hr class="text-white-50 mt-4">
        <button onclick="logout()" class="btn btn-link text-white text-decoration-none w-100 text-start ps-3">
            <i class="fa fa-power-off me-2"></i> <span>Keluar</span>
        </button>
    </nav>

    <main>
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm border-start border-success border-4">
            <div>
                <h4 class="mb-0 fw-bold text-success">Manajemen Persuratan</h4>
                <small class="text-muted" id="subJudul">Menghubungkan ke server...</small>
            </div>
            <button class="btn btn-success shadow-sm" onclick="tambahSurat()">
                <i class="fa fa-plus-circle me-1"></i> <span class="hide-mobile">Input Surat</span>
            </button>
        </div>

        <div class="alert alert-light border-0 shadow-sm mb-3">
            <small><i class="fa fa-info-circle text-success me-1"></i> Unit Kerja: <strong id="namaLembaga">...</strong></small>
        </div>

        <div class="card-custom overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-secondary small uppercase">
                        <tr>
                            <th class="px-3" width="100">Tipe</th>
                            <th width="120">Tanggal</th>
                            <th width="180">No. Surat</th>
                            <th>Perihal</th>
                            <th class="hide-mobile">Asal/Tujuan</th>
                            <th class="text-center">File</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabelSurat" class="small">
                        </tbody>
                </table>
                
                <div id="loader" class="text-center py-5">
                    <div class="spinner-border text-success spinner-border-sm" role="status"></div>
                    <p class="mt-2 text-muted x-small">Sinkronisasi data...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/global.js"></script>
    <script src="../js/surat.js"></script>
</body>
</html>
