<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SIM-ASBAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse shadow">
            <div class="text-center mb-4">
                <img src="https://via.placeholder.com/60" class="mb-2 rounded-circle bg-white p-1">
                <h6 class="fw-bold text-white">SIM-ASBAR-Apps</h6>
                <span id="userLevel" class="badge bg-warning text-dark small"></span>
            </div>
            <ul class="nav flex-column" id="mainMenu"></ul>
            <hr class="text-white-50">
            <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="fa fa-power-off"></i> Keluar</button>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <div>
                    <h5 class="mb-0">Halo, <span id="userName">User</span>!</h5>
                    <small id="userLembaga" class="text-muted"></small>
                </div>
                <div class="text-end">
                    <p id="clock" class="mb-0 small fw-bold text-muted"></p>
                </div>
            </div>

            <div class="row g-4" id="dashboardGrid">
                </div>
        </main>
    </div>
</div>

<script src="../js/dashboard.js"></script>
</body>
</html>
