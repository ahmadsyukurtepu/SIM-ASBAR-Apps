<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SIM-ASBAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="sidebar shadow">
        <div class="text-center mb-4 pt-3">
            <img src="../assets/logo.png" class="mb-2 rounded-circle bg-white p-1" width="55" onerror="this.src='https://via.placeholder.com/55'">
            <h6 class="fw-bold text-white mb-0">SIM-ASBAR</h6>
            <small class="text-white-50" id="userLevel">Memuat...</small>
        </div>
        
        <ul class="nav flex-column" id="mainMenu">
            </ul>

        <hr class="text-white-50 mt-4">
        <button onclick="logout()" class="btn btn-link text-white text-decoration-none w-100 text-start ps-3">
            <i class="fa fa-power-off me-2"></i> <span>Keluar</span>
        </button>
    </nav>

    <main>
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm border-start border-success border-4">
            <div>
                <h5 class="mb-0 fw-bold">Selamat Datang, <span id="userName" class="text-success">...</span>!</h5>
                <small class="text-muted" id="userLembaga">Memuat unit kerja...</small>
            </div>
            <div class="d-none d-md-block">
                <span class="badge bg-light text-dark border p-2">
                    <i class="fa fa-calendar-alt me-1 text-success"></i> TA 2025/2026
                </span>
            </div>
        </div>

        <h6 class="fw-bold mb-3"><i class="fa fa-chart-line me-2 text-success"></i>Ringkasan Data</h6>
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card-custom text-center p-3">
                    <small class="text-muted d-block">Surat</small>
                    <h4 class="fw-bold mb-0 text-primary" id="countSurat">0</h4>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card-custom text-center p-3">
                    <small class="text-muted d-block">Kas (Jt)</small>
                    <h4 class="fw-bold mb-0 text-success" id="countDana">0</h4>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card-custom text-center p-3">
                    <small class="text-muted d-block">Pegawai</small>
                    <h4 class="fw-bold mb-0 text-dark" id="countPegawai">0</h4>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card-custom text-center p-3">
                    <small class="text-muted d-block">Santri</small>
                    <h4 class="fw-bold mb-0 text-info" id="countSantri">0</h4>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card-custom text-center p-3">
                    <small class="text-muted d-block">Alumni</small>
                    <h4 class="fw-bold mb-0 text-warning" id="countAlumni">0</h4>
                </div>
            </div>
        </div>

        <div class="card-custom p-5 text-center text-muted">
            <i class="fa fa-chart-bar fa-3x mb-3 opacity-25"></i>
            <h6 class="fw-bold">Statistik Bulanan</h6>
            <p class="small mb-0">Data grafik akan muncul otomatis berdasarkan aktivitas input harian Anda.</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/global.js"></script>
    
    <script>
        // Memuat data statistik saat dashboard dibuka
        async function loadDashboardStats() {
            const res = await fetchModulData("STATISTIK");
            if(res && res.status === "success") {
                const d = res.data;
                document.getElementById("countSurat").innerText = d.totalSurat || 0;
                document.getElementById("countDana").innerText = d.totalKas || 0;
                document.getElementById("countSantri").innerText = d.totalSantri || 0;
                document.getElementById("countAlumni").innerText = d.totalAlumni || 0;
                document.getElementById("countPegawai").innerText = d.totalPegawai || 0;
            }
        }
        window.addEventListener('DOMContentLoaded', loadDashboardStats);
    </script>
</body>
</html>
