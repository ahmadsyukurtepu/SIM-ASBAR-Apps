<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SIM-ASBAR</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>SIM-ASBAR</h3>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="dashboard.html" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
                    
                    <li class="menu-item" data-level="Lv1">
                        <a href="dokumen.html"><i class="fas fa-file-alt"></i> Dokumen</a>
                    </li>

                    <li class="menu-item" data-level="Lv1,Lv2,Lv3">
                        <a href="surat.html"><i class="fas fa-envelope"></i> Persuratan</a>
                    </li>

                    <li class="menu-item" data-level="Lv1,Lv2,Lv3">
                        <a href="keuangan.html"><i class="fas fa-wallet"></i> Keuangan</a>
                    </li>

                    <li class="menu-item" data-level="Lv1,Lv2">
                        <a href="santri.html"><i class="fas fa-user-graduate"></i> Data Santri</a>
                    </li>

                    <li class="menu-item" data-level="Lv1,Lv2">
                        <a href="pegawai.html"><i class="fas fa-user-tie"></i> Data Pegawai</a>
                    </li>

                    <li class="menu-item" data-level="Lv1,Lv2,Lv3">
                        <a href="alumni.html"><i class="fas fa-users-viewfinder"></i> Data Alumni</a>
                    </li>

                    <li class="menu-item" data-level="Lv1,Lv2,Lv3">
                        <a href="galeri.html"><i class="fas fa-images"></i> Galeri</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h2 id="welcome-text">Selamat Datang</h2>
                </div>
                <div class="user-profile">
                    <div class="profile-info" onclick="toggleDropdown()">
                        <span id="user-display-name">User Name</span>
                        <img src="https://ui-avatars.com/api/?name=User&background=random" id="user-avatar" alt="Avatar">
                    </div>
                    <div id="profile-dropdown" class="dropdown-content">
                        <p id="user-level-badge">Level: -</p>
                        <hr>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Keluar</a>
                    </div>
                </div>
            </header>

            <section class="dashboard-stats">
                <div class="card">
                    <h3>Status Akun</h3>
                    <p id="info-lembaga">Lembaga: -</p>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/global.js"></script>
</body>
</html>
