<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 bg-white p-6 rounded-[30px] shadow-sm border-b-4 border-blue-500">
    <div>
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">Arsip Dokumen Yayasan</h2>
        <p class="text-xs text-slate-500">Manajemen SK, Sertifikat, dan Laporan Penting</p>
    </div>
    
    <button onclick="toggleModalDoc(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-2xl flex items-center justify-center gap-2 transition shadow-lg shadow-blue-100 text-sm font-bold">
        <i class="fas fa-plus-circle"></i>
        <span>Tambah Dokumen</span>
    </button>
</div>

<div class="bg-white rounded-[30px] shadow-sm border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left min-w-[700px]">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr>
                    <th class="px-6 py-4 text-[11px] font-black text-slate-400 uppercase tracking-widest">Kategori</th>
                    <th class="px-6 py-4 text-[11px] font-black text-slate-400 uppercase tracking-widest">Nomor</th>
                    <th class="px-6 py-4 text-[11px] font-black text-slate-400 uppercase tracking-widest">Tanggal</th>
                    <th class="px-6 py-4 text-[11px] font-black text-slate-400 uppercase tracking-widest">Judul</th>
                    <th class="px-6 py-4 text-[11px] font-black text-slate-400 uppercase tracking-widest text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBodyDoc" class="divide-y divide-slate-50">
                </tbody>
        </table>
    </div>
</div>

<div id="modalViewDoc" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-[110] p-4">
    <div class="bg-white rounded-[40px] w-full max-w-4xl h-[90vh] shadow-2xl overflow-hidden flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 id="viewTitle" class="text-lg font-black text-slate-800 uppercase italic">Preview Dokumen</h3>
            <div class="flex gap-2">
                <button id="btnSendWA" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                    <i class="fab fa-whatsapp"></i> KIRIM WA
                </button>
                <button onclick="toggleModalView(false)" class="text-slate-400 hover:text-red-500 transition">
                    <i class="fas fa-times-circle text-2xl"></i>
                </button>
            </div>
        </div>
        <div class="flex-1 bg-slate-200">
            <iframe id="docIframe" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>
</div>

<div id="modalInputDoc" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-[40px] w-full max-w-md shadow-2xl overflow-hidden">
        <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
    <h3 id="modalTitle" class="text-lg font-black text-slate-800 uppercase">Upload Dokumen</h3>
    
    <button onclick="toggleModalDoc(false)" class="text-slate-400 hover:text-red-500 transition">
        <i class="fas fa-times-circle text-xl"></i>
    </button>
</div>
        
        <form id="formDoc" class="p-8 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Kategori</label>
                    <select id="kategori" class="w-full border border-slate-200 p-3 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50">
                        <option value="SK">SK</option>
                        <option value="Sertifikat">Sertifikat</option>
                        <option value="Laporan">Laporan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Tanggal</label>
                    <input type="date" id="tanggal" required class="w-full border border-slate-200 p-3 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Nomor Dokumen</label>
                <input type="text" id="nomor" placeholder="Cth: 001/YAY/2026" required class="w-full border border-slate-200 p-3 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Judul Dokumen</label>
                <input type="text" id="judul" placeholder="Masukkan judul dokumen" required class="w-full border border-slate-200 p-3 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Pilih File PDF</label>
                <input type="file" id="filePdf" accept="application/pdf" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-2xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition cursor-pointer">
            </div>
            
            <button type="submit" id="btnSimpanDoc" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-3">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>SIMPAN & UPLOAD</span>
            </button>
        </form>
    </div>
</div>

<script src="js/dokumen.js"></script>
