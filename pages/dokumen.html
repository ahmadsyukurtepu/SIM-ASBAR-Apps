<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumen | SIM-ASBAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-200 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-xl"></aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-4 md:px-8 shadow-sm">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="mr-4 p-2 md:hidden text-slate-600 hover:bg-slate-100 rounded-lg">
                    <i data-lucide="menu"></i>
                </button>
                <h2 class="text-sm md:text-lg font-bold text-slate-800 tracking-tight">Dokumen Yayasan</h2>
            </div>
            
            <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-xl flex items-center space-x-2 transition shadow-md text-sm font-semibold">
                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                <span class="hidden md:inline">Tambah Dokumen</span>
            </button>
        </header>

        <main class="p-4 md:p-8 overflow-y-auto flex-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[700px]">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase">Kategori</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase">Nomor</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase">Tanggal</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase">Judul</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modalInput" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">Upload Dokumen Baru</h3>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600 transition">
                    <i data-lucide="x-circle"></i>
                </button>
            </div>
            <form id="formDoc" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Kategori</label>
                        <select id="kategori" class="w-full border border-slate-200 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                            <option>SK</option>
                            <option>Sertifikat</option>
                            <option>Laporan</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Tanggal</label>
                        <input type="date" id="tanggal" required class="w-full border border-slate-200 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nomor Dokumen</label>
                    <input type="text" id="nomor" placeholder="Cth: 001/YAY/2026" required class="w-full border border-slate-200 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Judul Dokumen</label>
                    <input type="text" id="judul" placeholder="Masukkan judul dokumen" required class="w-full border border-slate-200 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Pilih File PDF</label>
                    <input type="file" id="filePdf" accept="application/pdf" required class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
                </div>
                <button type="submit" id="btnSimpan" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center space-x-2">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    <span>Simpan & Upload</span>
                </button>
            </form>
        </div>
    </div>

    <script src="../js/global.js"></script> 
    <script src="../js/api.js"></script>
    <script src="../js/dokumen.js"></script>
</body>
</html>
