<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumen Yayasan | SIM-ASBAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside id="sidebar-container" class="w-64 bg-slate-900 text-slate-200 flex-shrink-0 flex flex-col transition-all duration-300">
        </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <h2 class="text-lg font-semibold text-slate-800">Manajemen Dokumen</h2>
            <div class="flex items-center space-x-4">
                <button onclick="openModalTambah()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Tambah Dokumen
                </button>
            </div>
        </header>

        <div class="p-8 overflow-y-auto">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="px-6 py-4 text-sm font-semibold text-slate-700">Kategori</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-700">Nomor</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-700">Tanggal</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-700">Judul Dokumen</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelDokumen" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="5" class="px-6 py-10 text-center text-slate-400">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/global.js"></script>
    <script src="../js/dokumen.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
