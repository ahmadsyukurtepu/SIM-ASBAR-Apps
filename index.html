<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SIM-ASBAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">SIM-ASBAR</h1>
            <p class="text-slate-500 text-sm">Yayasan As'adiyah Baru Orai Tempe</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <button type="submit" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition shadow-md">
                Masuk ke Sistem
            </button>
        </form>
        <div id="msg" class="mt-4 text-center text-red-500 text-sm hidden"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const msg = document.getElementById('msg');
            
            btn.innerText = "Loading...";
            btn.disabled = true;

            const data = {
                action: "login",
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            // Memanggil fungsi login dari api.js
            const response = await postData(data);
            
            if (response.status === "success") {
                // Simpan data user ke LocalStorage agar bisa diakses di halaman lain
                localStorage.setItem('userSimAsbar', JSON.stringify(response.user));
                window.location.href = "pages/dashboard.html";
            } else {
                msg.innerText = response.message;
                msg.classList.remove('hidden');
                btn.innerText = "Masuk ke Sistem";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
