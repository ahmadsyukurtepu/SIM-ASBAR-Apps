<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SIM-ASBAR-Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; margin: auto; }
        .btn-primary { background-color: #1a5e20; border: none; } /* Warna hijau khas pesantren */
        .btn-primary:hover { background-color: #1b5e20; opacity: 0.9; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <img src="https://via.placeholder.com/100" alt="Logo As'adiyah" class="mb-3">
    <h4 class="fw-bold">SIM-ASBAR-Apps</h4>
    <p class="text-muted small">Yayasan As'adiyah Baru Orai Tempe</p>
    <hr>
    
    <div id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="********" required>
        </div>
        <button onclick="prosesLogin()" id="btnLogin" class="btn btn-primary w-100 py-2">MASUK SISTEM</button>
        <div id="pesanError" class="mt-3 text-danger small" style="display:none;"></div>
    </div>
</div>

<script>
    // GANTI DENGAN URL WEB APP APPS SCRIPT BAPAK SETELAH DEPLOY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyoY4z019M-S7Gbz6fzOzL7InD4y4DmrI86tl98j62N649kIgXp0b1vONdqYUfSdb5kA/exec";

    function prosesLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("btnLogin");
        const msg = document.getElementById("pesanError");

        if(!user || !pass) return alert("Isi username dan password!");

        btn.disabled = true;
        btn.innerText = "Mengecek...";
        msg.style.display = "none";

        // Mengirim data ke Apps Script via POST (CORS)
        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "login",
                username: user,
                password: pass
            })
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                // Simpan data user di Browser (Session)
                localStorage.setItem("user_simasbar", JSON.stringify(res.user));
                // Pindah ke halaman Dashboard
                window.location.href = "pages/dashboard.html";
            } else {
                msg.innerText = res.message;
                msg.style.display = "block";
                btn.disabled = false;
                btn.innerText = "MASUK SISTEM";
            }
        })
        .catch(err => {
            console.error(err);
            alert("Terjadi kesalahan koneksi ke server.");
            btn.disabled = false;
            btn.innerText = "MASUK SISTEM";
        });
    }
</script>

</body>
</html>
